name: Build Mod

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Write settings.gradle
        run: |
          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  maven { url 'https://maven.fabricmc.net/' }
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          rootProject.name = "rct-wild-cap"
          EOF

      - name: Write build.gradle
        run: |
          cat > build.gradle << 'EOF'
          plugins {
              id 'fabric-loom' version '1.7-SNAPSHOT'
          }
          version = project.mod_version
          group = project.maven_group
          base { archivesName = project.archives_base_name }
          repositories {
              mavenCentral()
              maven { url "https://maven.fabricmc.net/" }
              exclusiveContent {
                  forRepository {
                      maven { name = "Modrinth"; url = "https://api.modrinth.com/maven" }
                  }
                  filter { includeGroup "maven.modrinth" }
              }
          }
          dependencies {
              minecraft "com.mojang:minecraft:${project.minecraft_version}"
              mappings "net.fabricmc:yarn:${project.yarn_mappings}:v2"
              modImplementation "net.fabricmc:fabric-loader:${project.loader_version}"
              modImplementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_version}"
              modCompileOnly "maven.modrinth:cobblemon:1.6.1+1.21.1"
              modCompileOnly "maven.modrinth:rctapi:0.10.6-beta"
          }
          processResources {
              inputs.property "version", project.version
              filteringCharset "UTF-8"
              filesMatching("fabric.mod.json") { expand "version": project.version }
          }
          tasks.withType(JavaCompile).configureEach { it.options.release = 21 }
          java {
              withSourcesJar()
              sourceCompatibility = JavaVersion.VERSION_21
              targetCompatibility = JavaVersion.VERSION_21
          }
          EOF

      - name: Build
        run: gradle build

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: rct-wild-cap
          path: build/libs/*[^-sources].jar
