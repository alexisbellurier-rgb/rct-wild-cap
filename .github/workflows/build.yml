name: Build Mod

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Gradle 8.8
        run: |
          curl -sL https://services.gradle.org/distributions/gradle-8.8-bin.zip -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle
          echo "/opt/gradle/gradle-8.8/bin" >> $GITHUB_PATH

      - name: Download Cobblemon
        run: |
          mkdir -p libs
          curl -L "https://cdn.modrinth.com/data/MdwFAVRL/versions/kF7CvxTo/Cobblemon-fabric-1.7.3%2B1.21.1.jar" -o libs/cobblemon.jar
          ls -lh libs/

      - name: Create directories
        run: |
          mkdir -p src/main/resources
          mkdir -p src/main/java/com/rctWildCap/mixin

      - name: Write Java sources
        run: |
          cat > src/main/java/com/rctWildCap/RctWildCapMod.java << 'EOF'
          package com.rctWildCap;
          import net.fabricmc.api.ModInitializer;
          import org.slf4j.Logger;
          import org.slf4j.LoggerFactory;
          public class RctWildCapMod implements ModInitializer {
              public static final String MOD_ID = "rct_wild_cap";
              public static final Logger LOGGER = LoggerFactory.getLogger(MOD_ID);
              @Override
              public void onInitialize() {
                  LOGGER.info("[RCT Wild Cap] Mod initialisé.");
              }
          }
          EOF

          cat > src/main/java/com/rctWildCap/mixin/PokemonSpawnActionMixin.java << 'EOF'
          package com.rctWildCap.mixin;
          import com.rctWildCap.RctWildCapMod;
          import net.minecraft.server.network.ServerPlayerEntity;
          import net.minecraft.server.world.ServerWorld;
          import net.minecraft.util.math.Vec3d;
          import org.spongepowered.asm.mixin.Mixin;
          import org.spongepowered.asm.mixin.injection.At;
          import org.spongepowered.asm.mixin.injection.Inject;
          import org.spongepowered.asm.mixin.injection.callback.CallbackInfoReturnable;
          import java.util.List;
          import java.util.Optional;
          @Mixin(targets = "com.cobblemon.mod.common.api.spawning.detail.PokemonSpawnAction", remap = false)
          public abstract class PokemonSpawnActionMixin {
              @Inject(method = "createEntity()Lcom/cobblemon/mod/common/entity/pokemon/PokemonEntity;", at = @At("HEAD"), cancellable = true, remap = false)
              private void rctWildCap_checkLevelCap(CallbackInfoReturnable<?> cir) {
                  try {
                      Object spawnablePos = this.getClass().getMethod("getSpawnablePosition").invoke(this);
                      if (spawnablePos == null) return;
                      Object world = spawnablePos.getClass().getMethod("getWorld").invoke(spawnablePos);
                      if (!(world instanceof ServerWorld serverWorld)) return;
                      Object levelRange = this.getClass().getMethod("getLevelRange").invoke(this);
                      if (levelRange == null) return;
                      int spawnLevelMax = (int) levelRange.getClass().getMethod("getLast").invoke(levelRange);
                      Object blockPos = spawnablePos.getClass().getMethod("getPosition").invoke(spawnablePos);
                      int bx = (int) blockPos.getClass().getMethod("getX").invoke(blockPos);
                      int by = (int) blockPos.getClass().getMethod("getY").invoke(blockPos);
                      int bz = (int) blockPos.getClass().getMethod("getZ").invoke(blockPos);
                      Vec3d spawnPos = new Vec3d(bx, by, bz);
                      List<ServerPlayerEntity> players = serverWorld.getPlayers();
                      if (players.isEmpty()) return;
                      Optional<ServerPlayerEntity> nearestOpt = players.stream()
                          .filter(p -> p.getPos().squaredDistanceTo(spawnPos) <= 128.0 * 128.0)
                          .min((a, b) -> Double.compare(a.getPos().squaredDistanceTo(spawnPos), b.getPos().squaredDistanceTo(spawnPos)));
                      if (nearestOpt.isEmpty()) return;
                      ServerPlayerEntity nearest = nearestOpt.get();
                      Class<?> rctApiClass = Class.forName("com.gitlab.srcmc.rctmod.api.RctApi");
                      Object trainerManager = rctApiClass.getMethod("getTrainerManager").invoke(null);
                      if (trainerManager == null) return;
                      Object playerData = trainerManager.getClass().getMethod("getData", ServerPlayerEntity.class).invoke(trainerManager, nearest);
                      int levelCap = (int) playerData.getClass().getMethod("getLevelCap").invoke(playerData);
                      if (spawnLevelMax >= levelCap) {
                          RctWildCapMod.LOGGER.debug("[RCT Wild Cap] Spawn bloqué — niveau {} >= cap {} ({})", spawnLevelMax, levelCap, nearest.getName().getString());
                          cir.setReturnValue(null);
                      }
                  } catch (Exception e) {
                      RctWildCapMod.LOGGER.debug("[RCT Wild Cap] Erreur: {}", e.getMessage());
                  }
              }
          }
          EOF

      - name: Fix fabric.mod.json
        run: |
          cat > src/main/resources/fabric.mod.json << 'EOF'
          {
            "schemaVersion": 1,
            "id": "rct_wild_cap",
            "version": "${version}",
            "name": "RCT Wild Level Cap",
            "description": "Empêche les Pokémon sauvages de spawner au-dessus du level cap RCT.",
            "authors": ["vous"],
            "license": "MIT",
            "environment": "*",
            "entrypoints": {
              "main": ["com.rctWildCap.RctWildCapMod"]
            },
            "mixins": ["rct_wild_cap.mixins.json"],
            "depends": {
              "fabricloader": ">=0.16.5",
              "fabric-api": "*",
              "minecraft": "~1.21.1"
            }
          }
          EOF

      - name: Fix mixins json
        run: |
          cat > src/main/resources/rct_wild_cap.mixins.json << 'EOF'
          {
            "required": true,
            "minVersion": "0.8",
            "package": "com.rctWildCap.mixin",
            "compatibilityLevel": "JAVA_21",
            "mixins": [
              "PokemonSpawnActionMixin"
            ],
            "injectors": {
              "defaultRequire": 1
            }
          }
          EOF

      - name: Write settings.gradle
        run: |
          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  maven { url 'https://maven.fabricmc.net/' }
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          rootProject.name = "rct-wild-cap"
          EOF

      - name: Write gradle.properties
        run: |
          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx2G
          minecraft_version=1.21.1
          yarn_mappings=1.21.1+build.3
          loader_version=0.16.5
          fabric_version=0.102.0+1.21.1
          mod_version=1.0.0
          maven_group=com.rctWildCap
          archives_base_name=rct-wild-cap
          EOF

      - name: Write build.gradle
        run: |
          cat > build.gradle << 'EOF'
          plugins {
              id 'fabric-loom' version '1.7-SNAPSHOT'
          }
          version = project.mod_version
          group = project.maven_group
          base { archivesName = project.archives_base_name }
          repositories {
              mavenCentral()
              maven { url "https://maven.fabricmc.net/" }
          }
          configurations {
              cobblemonLib
          }
          dependencies {
              minecraft "com.mojang:minecraft:${project.minecraft_version}"
              mappings "net.fabricmc:yarn:${project.yarn_mappings}:v2"
              modImplementation "net.fabricmc:fabric-loader:${project.loader_version}"
              modImplementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_version}"
              cobblemonLib fileTree(dir: 'libs', include: ['*.jar'])
              compileOnly fileTree(dir: 'libs', include: ['*.jar'])
          }
          processResources {
              inputs.property "version", project.version
              filteringCharset "UTF-8"
              filesMatching("fabric.mod.json") { expand "version": project.version }
          }
          tasks.withType(JavaCompile).configureEach {
              it.options.release = 21
          }
          java {
              withSourcesJar()
              sourceCompatibility = JavaVersion.VERSION_21
              targetCompatibility = JavaVersion.VERSION_21
          }
          EOF

      - name: Build
        run: gradle build

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: rct-wild-cap
          path: build/libs/*[^-sources].jar
