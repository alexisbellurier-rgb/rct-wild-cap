name: Build Mod

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Gradle 8.8
        run: |
          curl -sL https://services.gradle.org/distributions/gradle-8.8-bin.zip -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle
          echo "/opt/gradle/gradle-8.8/bin" >> $GITHUB_PATH

      - name: Download deps
        run: |
          mkdir -p libs
          curl -L "https://cdn.modrinth.com/data/MdwFAVRL/versions/s64m1opn/Cobblemon-fabric-1.7.3%2B1.21.1.jar" -o libs/cobblemon.jar
          ls -lh libs/

      - name: Fix fabric.mod.json
        run: |
          cat > src/main/resources/fabric.mod.json << 'EOF'
          {
            "schemaVersion": 1,
            "id": "rct_wild_cap",
            "version": "${version}",
            "name": "RCT Wild Level Cap",
            "description": "Empêche les Pokémon sauvages de spawner au-dessus du level cap RCT.",
            "authors": ["vous"],
            "license": "MIT",
            "environment": "*",
            "entrypoints": {
              "main": ["com.rctWildCap.RctWildCapMod"]
            },
            "mixins": ["rct_wild_cap.mixins.json"],
            "depends": {
              "fabricloader": ">=0.16.5",
              "fabric-api": "*",
              "minecraft": "~1.21.1"
            }
          }
          EOF

      - name: Write settings.gradle
        run: |
          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  maven { url 'https://maven.fabricmc.net/' }
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          rootProject.name = "rct-wild-cap"
          EOF

      - name: Write gradle.properties
        run: |
          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx2G
          minecraft_version=1.21.1
          yarn_mappings=1.21.1+build.3
          loader_version=0.16.5
          fabric_version=0.102.0+1.21.1
          mod_version=1.0.0
          maven_group=com.rctWildCap
          archives_base_name=rct-wild-cap
          EOF

      - name: Write build.gradle
        run: |
          cat > build.gradle << 'EOF'
          plugins {
              id 'fabric-loom' version '1.7-SNAPSHOT'
          }
          version = project.mod_version
          group = project.maven_group
          base { archivesName = project.archives_base_name }
          repositories {
              mavenCentral()
              maven { url "https://maven.fabricmc.net/" }
          }
          dependencies {
              minecraft "com.mojang:minecraft:${project.minecraft_version}"
              mappings "net.fabricmc:yarn:${project.yarn_mappings}:v2"
              modImplementation "net.fabricmc:fabric-loader:${project.loader_version}"
              modImplementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_version}"
              compileOnly fileTree(dir: 'libs', include: ['*.jar'])
          }
          processResources {
              inputs.property "version", project.version
              filteringCharset "UTF-8"
              filesMatching("fabric.mod.json") { expand "version": project.version }
          }
          tasks.withType(JavaCompile).configureEach { it.options.release = 21 }
          java {
              withSourcesJar()
              sourceCompatibility = JavaVersion.VERSION_21
              targetCompatibility = JavaVersion.VERSION_21
          }
          EOF

      - name: Build
        run: gradle build

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: rct-wild-cap
          path: build/libs/*[^-sources].jar
